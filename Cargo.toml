[package]
name = "prism3-config"
version = "0.1.0"
edition = "2021"
rust-version = "1.70"
authors = ["Hu Haixing <starfish.hu@gmail.com>"]
license = "Apache-2.0"
repository = "https://github.com/3-prism/prism3-rust-config"
description = "Powerful type-safe configuration management with multi-value properties, variable substitution, and rich data type support"
homepage = "https://github.com/3-prism/prism3-rust-config"
documentation = "https://docs.rs/prism3-config"
readme = "README.md"
keywords = ["config", "configuration", "settings", "properties", "prism3"]
categories = ["config", "development-tools"]
exclude = [
    "coverage.sh",
    "COVERAGE.md",
    "COVERAGE.zh_CN.md",
    ".circleci/*",
    "ci-check.sh",
    ".llvm-cov.toml",
    ".cargo-audit.toml.example",
]

[lib]
name = "prism3_config"
doctest = false

[dependencies]
prism3-core = "0.1.0"
prism3-value = "0.1.1"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "2.0.17"
tracing = "0.1"
chrono = { version = "0.4", features = ["serde"] }
regex = "1.10"
url = "2.5"
num-bigint = { version = "0.4", features = ["serde"] }
bigdecimal = { version = "0.4", features = ["serde"] }
